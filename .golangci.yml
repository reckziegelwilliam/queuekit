# golangci-lint configuration
# See: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  go: '1.24'

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - fieldalignment

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/reckziegelwilliam/queuekit

  goconst:
    min-len: 3
    min-occurrences: 3

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - whyNoLint
      - unnamedResult

  gocyclo:
    min-complexity: 15

  dupl:
    threshold: 100

  misspell:
    locale: US

  lll:
    line-length: 120
    tab-width: 4

  unparam:
    check-exported: false

  nakedret:
    max-func-lines: 30

  prealloc:
    simple: true
    range-loops: true
    for-loops: false

  revive:
    rules:
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis
    - typecheck     # Type-check Go code
    - unused        # Check for unused code
    - gofmt         # Check code formatting
    - goimports     # Check import formatting
    - goconst       # Find repeated strings that could be constants
    - gocritic      # Comprehensive linting
    - gocyclo       # Check cyclomatic complexity
    - gosec         # Inspects for security problems
    - misspell      # Spell checking
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Reports unused function parameters
    - nakedret      # Finds naked returns in functions
    - prealloc      # Find slice declarations that could be pre-allocated
    - revive        # Fast, configurable, extensible, flexible, and beautiful linter
    - stylecheck    # Replacement for golint
    - whitespace    # Detection of leading and trailing whitespace

  disable:
    - funlen        # Too noisy for early development
    - gocognit      # Similar to gocyclo, redundant
    - godox         # Allow TODO/FIXME comments
    - mnd           # Magic number detection - too strict for initial dev
    - testpackage   # Separate test packages not always needed

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst

    # Exclude shadow checking on the variable named err
    - text: "shadow: declaration of \"err\""
      linters:
        - govet

    # Exclude known issues with third-party libraries
    - path: vendor/
      linters:
        - all

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

